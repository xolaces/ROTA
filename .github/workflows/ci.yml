name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      # CI gates on the hermetic unit tests only. The integration tests use
      # Testcontainers (Docker Postgres/Redis) and are flaky on GitHub-hosted
      # runners (Docker Hub pull limits, Ryuk reaper) — run them locally
      # (`dotnet test tests/ROTA.IntegrationTests`, Docker required).
      - name: Unit tests
        run: dotnet test tests/ROTA.UnitTests --configuration Release --no-build
