# =============================================================
# ROTA — Local Development Environment
# Phase 0 | docker-compose up -d to start
# docker-compose down to stop (data persists in named volumes)
# docker-compose down -v to stop AND wipe all data
# =============================================================

services:

  # -----------------------------------------------------------
  # PostgreSQL 16 — Primary database
  # -----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: rota-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       rota_dev
      POSTGRES_USER:     rota_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - rota_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rota_user -d rota_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # Redis 7 — Cache, session store, rate limiting, leaderboards
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: rota-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    ports:
      - "6379:6379"
    volumes:
      - rota_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # pgAdmin — PostgreSQL GUI (optional, comment out if not needed)
  # Access at: http://localhost:5050
  # Login with PGADMIN_EMAIL / PGADMIN_PASSWORD from .env
  # -----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rota-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@rota.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD must be set in .env}
    ports:
      - "5050:80"
    volumes:
      - rota_pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  rota_postgres_data:
  rota_redis_data:
  rota_pgadmin_data:
